<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>照片转拼豆图纸</title>
    <!-- 使用官方 CDN -->
    <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/@gradio/lite@0.3.0/dist/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gradio/lite@0.3.0/dist/style.css" />
</head>
<body>
    <gradio-lite>
        <script type="py">
            import gradio as gr
            
            def hello(name):
                return f"你好，{name}！"
            
            with gr.Blocks() as demo:
                gr.Markdown("# ✅ Gradio-Lite 工作正常！")
                inp = gr.Textbox(label="输入你的名字")
                out = gr.Textbox(label="输出")
                btn = gr.Button("点击")
                btn.click(hello, inp, out)
            
            demo
        </script>
    </gradio-lite>
</body>
</html>
